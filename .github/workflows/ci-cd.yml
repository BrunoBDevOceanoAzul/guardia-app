name: CI/CD Pipeline

on:
  push:
    branches: [develop, test, main]
  pull_request:
    branches: [test, main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: guardia-app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  build-dev:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: dev-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2 Dev
        id: deploy
        env:
          IMAGE_TAG: dev-${{ github.sha }}
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_DEV_INSTANCE_ID }} \
            --document-name AWS-RunRemoteScript \
            --parameters '{"commandString":["cd /opt/guardia && IMAGE_TAG='$IMAGE_TAG' docker-compose -f docker-compose.prod.yml up -d"]}' \
            --region ${{ env.AWS_REGION }}
          echo "deploy_url=https://dev.irisregistro.qzz.io" >> $GITHUB_OUTPUT

  build-test:
    needs: test
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: test-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2 Test
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_TEST_INSTANCE_ID }} \
            --document-name AWS-RunRemoteScript \
            --parameters '{"commandString":["cd /opt/guardia && IMAGE_TAG='$IMAGE_TAG' docker-compose -f docker-compose.prod.yml up -d"]}' \
            --region ${{ env.AWS_REGION }}

  build-prod:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2 Prod
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_PROD_INSTANCE_ID }} \
            --document-name AWS-RunRemoteScript \
            --parameters '{"commandString":["cd /opt/guardia && IMAGE_TAG='$IMAGE_TAG' docker-compose -f docker-compose.prod.yml up -d"]}' \
            --region ${{ env.AWS_REGION }}

  notify-retool:
    needs: [build-dev, build-test, build-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Retool
        env:
          RETOOL_API_URL: "https://retool_01kpbqncmtsjm95javczj95a2w.retool.com/api/v1/webhooks/trigger"
        run: |
          STATUS="success"
          if [[ "${{ needs.build-dev.result }}" == "failure" ]] || [[ "${{ needs.build-test.result }}" == "failure" ]] || [[ "${{ needs.build-prod.result }}" == "failure" ]]; then
            STATUS="failure"
          fi
          curl -X POST $RETOOL_API_URL \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"$STATUS\",\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\",\"run_id\":\"${{ github.run_id }}\"}"