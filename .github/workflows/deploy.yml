name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: guardia-app
  ECS_CLUSTER: guardia-cluster
  ECS_SERVICE: guardia-service
  CONTAINER_NAME: guardia-app

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            -f Dockerfile .

          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate task definition
        id: task-def
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          AWS_ACCOUNT_ID_VAL: ${{ secrets.AWS_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          COGNITO_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          IP_SALT: ${{ secrets.IP_HASH_SALT }}
          APP_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          APP_SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          jq -n \
            --arg image          "$IMAGE_URI" \
            --arg account        "$AWS_ACCOUNT_ID_VAL" \
            --arg db_url         "$DATABASE_URL" \
            --arg gemini         "$GEMINI_API_KEY" \
            --arg maps_key       "$MAPS_KEY" \
            --arg cognito        "$COGNITO_ID" \
            --arg ip_salt        "$IP_SALT" \
            --arg aws_key        "$APP_ACCESS_KEY" \
            --arg aws_secret     "$APP_SECRET_KEY" \
            '{
              family: "guardia-app",
              networkMode: "awsvpc",
              requiresCompatibilities: ["FARGATE"],
              cpu: "256",
              memory: "512",
              executionRoleArn: ("arn:aws:iam::" + $account + ":role/ecsTaskExecutionRole"),
              containerDefinitions: [{
                name: "guardia-app",
                image: $image,
                essential: true,
                portMappings: [{"containerPort": 3000, "protocol": "tcp"}],
                environment: [
                  {"name":"NODE_ENV",                        "value":"production"},
                  {"name":"PORT",                            "value":"3000"},
                  {"name":"HOSTNAME",                        "value":"0.0.0.0"},
                  {"name":"AWS_REGION",                      "value":"us-east-1"},
                  {"name":"AWS_ACCESS_KEY_ID",               "value":$aws_key},
                  {"name":"AWS_SECRET_ACCESS_KEY",           "value":$aws_secret},
                  {"name":"AWS_S3_BUCKET_ANALYSIS",          "value":"guardia-analysis-archive"},
                  {"name":"AWS_S3_ENDPOINT",                 "value":"https://acessobucketguardia-rf113rcgmu8fz3ah5snm3zbp6f6mnuse1a-s3alias.s3.us-east-1.amazonaws.com"},
                  {"name":"AWS_S3_FORCE_PATH_STYLE",         "value":"false"},
                  {"name":"COGNITO_CLIENT_ID",               "value":$cognito},
                  {"name":"DATABASE_URL",                    "value":$db_url},
                  {"name":"GEMINI_API_KEY",                  "value":$gemini},
                  {"name":"NEXT_PUBLIC_GOOGLE_MAPS_API_KEY", "value":$maps_key},
                  {"name":"IP_HASH_SALT",                    "value":$ip_salt}
                ],
                logConfiguration: {
                  logDriver: "awslogs",
                  options: {
                    "awslogs-group": "/ecs/guardia-app",
                    "awslogs-region": "us-east-1",
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              }]
            }' > task-def.json

          echo "task-definition=task-def.json" >> "$GITHUB_OUTPUT"

      - name: Register task definition
        id: register-task
        run: |
          TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-def.json \
            --region us-east-1 \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task-arn=${TASK_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered: ${TASK_ARN}"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register-task.outputs.task-arn }}" \
            --desired-count 1 \
            --force-new-deployment \
            --region us-east-1 \
            --output text > /dev/null
          echo "Force deploy iniciado"

      - name: Wait for service stability
        run: |
          echo "Aguardando serviço estabilizar..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region us-east-1
          echo "Servico estavel!"

      - name: Print deployment URL
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names guardia-alb \
            --region us-east-1 \
            --query 'LoadBalancers[0].DNSName' \
            --output text 2>/dev/null || echo "")

          if [ -n "$ALB_DNS" ] && [ "$ALB_DNS" != "None" ]; then
            APP_URL="http://${ALB_DNS}"
          else
            TASK_ARN=$(aws ecs list-tasks \
              --cluster "$ECS_CLUSTER" \
              --service-name "$ECS_SERVICE" \
              --region us-east-1 \
              --query 'taskArns[0]' --output text)
            ENI_ID=$(aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$TASK_ARN" \
              --region us-east-1 \
              --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
              --output text)
            PUBLIC_IP=$(aws ec2 describe-network-interfaces \
              --network-interface-ids "$ENI_ID" \
              --region us-east-1 \
              --query 'NetworkInterfaces[0].Association.PublicIp' \
              --output text)
            APP_URL="http://${PUBLIC_IP}:3000"
          fi

          echo "================================================"
          echo " Deploy concluido!"
          echo " URL: ${APP_URL}"
          echo " Image: ${{ steps.build-image.outputs.image }}"
          echo "================================================"
